name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (commit SHA)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to Dev Environment
        run: |
          echo "Deploying image 10mey/platform-demo:${{ github.event.inputs.image_tag }} to DEV environment"
