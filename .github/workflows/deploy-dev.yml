name: Deploy to Dev

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (commit SHA)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update image tag in dev deployment
        run: |
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ github.event.inputs.image_tag }}/g" k8s/dev/deployment.yaml

      - name: Commit updated deployment file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/dev/deployment.yaml
          git commit -m "Promote image ${{ github.event.inputs.image_tag }} to dev"
          git push
