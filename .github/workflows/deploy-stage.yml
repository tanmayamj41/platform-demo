name: Deploy to Stage

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote to Stage"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update image tag in stage deployment
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag }}
          sed -i "s|image: 10mey/platform-demo:.*|image: 10mey/platform-demo:$IMAGE_TAG|g" k8s/stage/deployment.yaml

      - name: Commit updated stage deployment
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/stage/deployment.yaml
          git diff --cached --quiet || git commit -m "Promote image ${{ github.event.inputs.image_tag }} to stage"
          git push
