apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
    spec:
      containers:
      - name: app
        image: YOUR_DOCKERHUB_USERNAME/platform-demo:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
