apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo
  namespace: stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
    spec:
      containers:
        - name: platform-demo
          image: 10mey/platform-demo:eec52e4d144951b54c503bb9dff2b68427aa62fe
          ports:
            - containerPort: 5000
          env:
            - name: ENVIRONMENT
              value: "stage"
            - name: LOG_LEVEL
              value: "INFO"
