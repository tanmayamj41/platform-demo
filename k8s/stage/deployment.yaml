apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo
  namespace: stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
    spec:
      containers:
        - name: platform-demo
          image: 10mey/platform-demo:ad038589390a78fb2553955262f20000c6609c7c
          ports:
            - containerPort: 5000
          env:
            - name: ENVIRONMENT
              value: "stage"
            - name: LOG_LEVEL
              value: "INFO"
